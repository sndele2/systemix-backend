name = "systemix-backend"
main = "api-main/api/src/index.ts"
compatibility_date = "2026-01-26"

[triggers]
crons = ["*/5 * * * *"]

# Add your D1 database binding
[[d1_databases]]
binding = "SYSTEMIX"
migrations_dir = "api-main/api/migrations"
database_name = "systemix"
database_id = "b6573bdd-c88d-4480-a882-745fb10177c7"  # Get this from: wrangler d1 list

[[kv_namespaces]]
binding = "SYSTEMIX_KV"
id = "8daf7908b2534de989c486d3e98f5216"
preview_id = "d8bd5be6e38d4fa7ba794587c5cff08c"

# Secrets (set via: wrangler secret put <NAME>)
# - OPENAI_API_KEY
# - TEXTBELT_API_KEY
# - CLIENT_PHONE
# - OWNER_PHONE_NUMBER
# - TWILIO_ACCOUNT_SID
# - TWILIO_AUTH_TOKEN

[vars]
VOICE_CONSENT_SCRIPT = "Thanks for calling. We're with a customer right now, but we want to help. Leave your name and request after the beep, and look out for a text from us shortly. By staying on the line, you consent to receive texts."
TWILIO_SIGNATURE_MODE = "log"
ENVIRONMENT = "production"

[env.dev]
name = "systemix-backend-dev"

[env.dev.vars]
VOICE_CONSENT_SCRIPT = "Thanks for calling. We're with a customer right now, but we want to help. Leave your name and request after the beep, and look out for a text from us shortly. By staying on the line, you consent to receive texts."
TWILIO_SIGNATURE_MODE = "log"
ENVIRONMENT = "development"
SYSTEMIX_NUMBER = "+1XXXXXXXXXX"

[[env.dev.d1_databases]]
binding = "SYSTEMIX"
migrations_dir = "api-main/api/migrations"
database_name = "systemix-dev"
database_id = "82088792-6c4a-41fc-95a0-1d5129c1c3f3"

[[env.dev.kv_namespaces]]
binding = "SYSTEMIX_KV"
id = "8daf7908b2534de989c486d3e98f5216"
preview_id = "d8bd5be6e38d4fa7ba794587c5cff08c"
